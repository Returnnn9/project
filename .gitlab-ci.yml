stages:
  - build
  - deploy

# Ensures code compiles and static assets build correctly before deployment
build_check:
  stage: build
  image: oven/bun:alpine
  only:
    - main
    - master
  script:
    - bun install --frozen-lockfile
    - bunx prisma generate
    - bun run build

deploy:
  stage: deploy
  image: alpine:latest
  needs: ["build_check"] # Only trigger deploy if build passes 100%
  only:
    - main
    - master
  before_script:
    - apk update && apk add openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - |
      ssh $SSH_USER@$SSH_HOST "
        cd ${TARGET_DIR:-/var/www/smusl} &&
        git fetch origin &&
        git reset --hard origin/$CI_COMMIT_REF_NAME &&
        docker compose up -d --build &&
        docker image prune -f
      "
